<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 10px 8px 30px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 8px;
    }

    .logo-wrap {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
      background: radial-gradient(circle, rgba(103,245,154,0.28) 0%, rgba(103,245,154,0.10) 38%, rgba(0,0,0,0) 72%);
    }

    .logo {
      width: 260px;
      height: auto;
      display: block;
      transform: scale(1.45);
      transform-origin: center center;
    }

    h1 {
      margin: 4px 0 16px;
      font-size: 32px;
      font-weight: 700;
    }

    .card {
      width: 100%;
      background: #111;
      border-radius: 26px;
      padding: 20px 10px;
      margin-top: 18px;
      box-sizing: border-box;
    }

    .label {
      font-size: 18px;
      color: rgba(255,255,255,0.82);
      margin-bottom: 10px;
    }

    .weight {
      font-size: 58px;
      font-weight: 700;
      color: #6bf5a1;
      line-height: 1.05;
    }

    .sub {
      margin-top: 10px;
      opacity: 0.6;
      font-size: 14px;
    }

    .chart-wrap {
      width: 100%;
      margin-top: 12px;
    }

    .canvas-holder {
      width: 100%;
      height: 300px;
      margin: 0 auto;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 16px;
      background: #222;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      min-width: 96px;
    }

    button.active {
      background: #6bf5a1;
      color: #000;
      font-weight: 700;
    }

    @media (max-width: 430px) {
      .container {
        padding: 8px 4px 26px;
      }

      .logo-wrap {
        width: 210px;
        height: 210px;
      }

      .logo {
        width: 230px;
        transform: scale(1.42);
      }

      h1 {
        font-size: 30px;
      }

      .weight {
        font-size: 52px;
      }

      .canvas-holder {
        height: 280px;
      }

      button {
        min-width: 92px;
        padding: 11px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-wrap">
        <img class="logo" src="logo.png.PNG" alt="Plant scale logo">
      </div>
      <h1>Scale Dashboard</h1>
    </div>

    <div class="card">
      <div class="label">Current Weight</div>
      <div class="weight" id="weight">Loading...</div>
      <div class="sub">Live from Firebase every 2s</div>
    </div>

    <div class="card">
      <div class="label" id="title">Last 24 Hours</div>

      <div class="chart-wrap">
        <div class="canvas-holder">
          <canvas id="chart"></canvas>
        </div>
      </div>

      <div class="actions">
        <button id="btn6" onclick="setRange(6)">6 Hours</button>
        <button id="btn24" class="active" onclick="setRange(24)">24 Hours</button>
        <button id="btn168" onclick="setRange(168)">7 Days</button>
        <button id="btn720" onclick="setRange(720)">30 Days</button>
      </div>
    </div>
  </div>

  <script>
    const channelID = 3336368;
    const apiKey = "ZURDVTF2AB34F5Y6";
    const firebaseWeightUrl = "https://scale-dashboard-91574-default-rtdb.asia-southeast1.firebasedatabase.app/weight.json";

    let chart = null;
    let currentRange = 24;

    async function fetchData(hours) {
      const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${apiKey}&results=8000`;
      const res = await fetch(url);
      const data = await res.json();

      const now = new Date();
      const cutoff = new Date(now.getTime() - hours * 60 * 60 * 1000);

      const labels = [];
      const values = [];

      (data.feeds || []).forEach(feed => {
        const t = new Date(feed.created_at);
        if (t >= cutoff && feed.field1) {
          labels.push(
            t.toLocaleString("en-US", {
              hour: "2-digit",
              minute: "2-digit",
              hour12: false
            })
          );
          values.push(parseFloat(feed.field1));
        }
      });

      updateChart(labels, values);
    }

    function updateChart(labels, values) {
      const ctx = document.getElementById("chart").getContext("2d");

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: "rgba(255,0,0,0.75)",
            borderColor: "#ff4040",
            borderWidth: 1,
            borderRadius: 2,
            barPercentage: 0.9,
            categoryPercentage: 0.95
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          layout: {
            padding: {
              left: 8,
              right: 8,
              top: 6,
              bottom: 0
            }
          },
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            x: {
              offset: true,
              ticks: {
                color: "#aaa",
                maxTicksLimit: 4,
                autoSkip: true,
                maxRotation: 0,
                minRotation: 0
              },
              grid: {
                display: false
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: "#aaa",
                maxTicksLimit: 6,
                padding: 6
              },
              grid: {
                color: "rgba(255,255,255,0.08)"
              }
            }
          }
        }
      });
    }

    async function updateWeight() {
      try {
        const res = await fetch(firebaseWeightUrl + "?t=" + Date.now());
        const weight = await res.json();

        if (weight === null || weight === undefined || isNaN(Number(weight))) {
          document.getElementById("weight").innerText = "No data";
          return;
        }

        document.getElementById("weight").innerText = Number(weight).toFixed(1) + " g";
      } catch (e) {
        document.getElementById("weight").innerText = "Error";
      }
    }

    function setActive(hours) {
      document.getElementById("btn6").classList.remove("active");
      document.getElementById("btn24").classList.remove("active");
      document.getElementById("btn168").classList.remove("active");
      document.getElementById("btn720").classList.remove("active");
      document.getElementById("btn" + hours).classList.add("active");
    }

    function setRange(hours) {
      currentRange = hours;
      setActive(hours);

      if (hours === 6) {
        document.getElementById("title").innerText = "Last 6 Hours";
      } else if (hours === 24) {
        document.getElementById("title").innerText = "Last 24 Hours";
      } else if (hours === 168) {
        document.getElementById("title").innerText = "Last 7 Days";
      } else if (hours === 720) {
        document.getElementById("title").innerText = "Last 30 Days";
      }

      fetchData(hours);
    }

    updateWeight();
    setRange(24);

    setInterval(updateWeight, 2000);
    setInterval(() => fetchData(currentRange), 60000);
  </script>
</body>
</html>
